name = "devdash"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Serve on the free workers.dev subdomain (e.g. devdash.<account>.workers.dev).
# Flip this to false and uncomment the [[routes]] block below once you have
# access to the phonebot.co.uk zone.
workers_dev = true

# Bundle devdash.html (one level up) as a text import so routes.ts can inject
# the authenticated session and serve it as the SPA shell.
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[kv_namespaces]]
binding = "DASHBOARD_KV"
id = "e5195c92099746d097c0b98caa81e9ef"

# Custom-domain route — managed manually in Cloudflare dashboard (wrangler
# cannot assign it from this machine as the phonebot.ae zone is on a different
# Cloudflare account login).
# [[routes]]
# pattern = "devdash.phonebot.ae/*"
# zone_name = "phonebot.ae"

# Daily cron at 13:00 UTC (~midnight AWST / 6am PKT / 11pm UK the day before)
[triggers]
crons = ["0 13 * * *"]
